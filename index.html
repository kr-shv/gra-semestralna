<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIEW - That Level Again Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #eee;
        }

        .game-wrapper {
            text-align: center;
        }

        .header {
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            color: #00ff88;
            text-shadow: 3px 3px 0 #006644;
            margin-bottom: 10px;
        }

        .level-info {
            font-size: 12px;
            color: #aaa;
        }

        canvas {
            border: 4px solid #00ff88;
            background: #87ceeb;
            display: block;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3);
        }

        .hint {
            margin-top: 20px;
            font-size: 10px;
            color: #ffaa00;
            max-width: 600px;
            line-height: 1.6;
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 9px;
            color: #888;
        }

        .message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .message-box {
            background: #1a1a2e;
            border: 4px solid #00ff88;
            padding: 40px;
            text-align: center;
            max-width: 500px;
        }

        .message-box h2 {
            color: #00ff88;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .message-box p {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .btn {
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="header">
            <div class="title">V I E W</div>
            <div class="level-info">POZIOM <span id="levelNum">1</span> / 12</div>
        </div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="hint" id="hintText">Idź do drzwi używając WASD lub strzałek</div>
        <div class="controls-hint">WASD / STRZAŁKI = ruch | SPACJA = skok</div>
    </div>

    <div class="message-overlay" id="messageOverlay">
        <div class="message-box">
            <h2 id="messageTitle">GRATULACJE!</h2>
            <p id="messageText">Ukończyłeś wszystkie poziomy!</p>
            <button class="btn" onclick="location.reload()">ZAGRAJ PONOWNIE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let currentLevel = 0;
        let keys = {};
        let player = {};
        let door = {};
        let buttons = [];
        let platforms = [];
        let doorUnlocked = false;
        let levelTimer = 0;
        let animationFrame = null;

        // Player physics
        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 4;
        const PLAYER_SIZE = 30;

        // Level definitions
        const levels = [
            {
                // Level 1: Tutorial - just walk to door
                hint: "Idź do drzwi używając WASD lub strzałek",
                init: () => {
                    player = { x: 50, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 280, locked: false };
                    buttons = [];
                    platforms = [{ x: 0, y: 370, w: 600, h: 30 }];
                    doorUnlocked = true;
                }
            },
            {
                // Level 2: Button to unlock door
                hint: "Naciśnij przycisk aby otworzyć drzwi",
                init: () => {
                    player = { x: 50, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 280, locked: true };
                    buttons = [{ x: 250, y: 350, pressed: false }];
                    platforms = [{ x: 0, y: 370, w: 600, h: 30 }];
                    doorUnlocked = false;
                }
            },
            {
                // Level 3: Button on platform - need to jump
                hint: "Czasami trzeba wskoczyć wyżej...",
                init: () => {
                    player = { x: 50, y: 220, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 280, locked: true };
                    buttons = [{ x: 250, y: 120, pressed: false }];
                    platforms = [
                        { x: 0, y: 250, w: 150, h: 20 },
                        { x: 220, y: 150, w: 100, h: 20 },
                        { x: 400, y: 250, w: 200, h: 20 },
                        { x: 0, y: 370, w: 600, h: 30 }
                    ];
                    doorUnlocked = false;
                }
            },
            {
                // Level 4: Two buttons sequence
                hint: "Naciśnij przyciski w kolejności: LEWY potem PRAWY",
                init: () => {
                    player = { x: 300, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 280, locked: true };
                    buttons = [
                        { x: 100, y: 350, pressed: false, id: 0 },
                        { x: 450, y: 350, pressed: false, id: 1 }
                    ];
                    platforms = [{ x: 0, y: 370, w: 600, h: 30 }];
                    doorUnlocked = false;
                    this.sequence = [];
                }
            },
            {
                // Level 5: Wait for door to unlock
                hint: "Poczekaj... drzwi otworzą się same",
                init: () => {
                    player = { x: 50, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 280, locked: true };
                    buttons = [];
                    platforms = [{ x: 0, y: 370, w: 600, h: 30 }];
                    doorUnlocked = false;
                    levelTimer = 0;
                }
            },
            {
                // Level 6: Hidden button (press W while on ground)
                hint: "Sekretny przycisk... spróbuj nacisnąć W gdy stoisz",
                init: () => {
                    player = { x: 50, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 280, locked: true };
                    buttons = [];
                    platforms = [{ x: 0, y: 370, w: 600, h: 30 }];
                    doorUnlocked = false;
                }
            },
            {
                // Level 7: Reversed controls
                hint: "Coś jest nie tak ze sterowaniem...",
                init: () => {
                    player = { x: 50, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 280, locked: true };
                    buttons = [{ x: 400, y: 350, pressed: false }];
                    platforms = [{ x: 0, y: 370, w: 600, h: 30 }];
                    doorUnlocked = false;
                    this.reversed = true;
                }
            },
            {
                // Level 8: Platforming challenge
                hint: "Skacz ostrożnie!",
                init: () => {
                    player = { x: 50, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 80, locked: false };
                    buttons = [];
                    platforms = [
                        { x: 0, y: 330, w: 100, h: 20 },
                        { x: 150, y: 280, w: 80, h: 20 },
                        { x: 280, y: 230, w: 80, h: 20 },
                        { x: 410, y: 180, w: 80, h: 20 },
                        { x: 500, y: 110, w: 100, h: 20 },
                        { x: 0, y: 370, w: 600, h: 30 }
                    ];
                    doorUnlocked = true;
                }
            },
            {
                // Level 9: Button is the door
                hint: "Może drzwi to nie zawsze drzwi?",
                init: () => {
                    player = { x: 50, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 280, locked: true, isButton: true };
                    buttons = [];
                    platforms = [{ x: 0, y: 370, w: 600, h: 30 }];
                    doorUnlocked = false;
                }
            },
            {
                // Level 10: Moving platform
                hint: "Poczekaj na platformę...",
                init: () => {
                    player = { x: 50, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 80, locked: false };
                    buttons = [];
                    platforms = [
                        { x: 0, y: 330, w: 150, h: 20 },
                        { x: 250, y: 200, w: 100, h: 20, moving: true, dir: 1, minY: 150, maxY: 300 },
                        { x: 450, y: 110, w: 150, h: 20 },
                        { x: 0, y: 370, w: 600, h: 30 }
                    ];
                    doorUnlocked = true;
                    levelTimer = 0;
                }
            },
            {
                // Level 11: Three buttons, right order
                hint: "1-2-3 kolejność ma znaczenie",
                init: () => {
                    player = { x: 300, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 280, locked: true };
                    buttons = [
                        { x: 80, y: 350, pressed: false, id: 0, label: "1" },
                        { x: 280, y: 350, pressed: false, id: 1, label: "2" },
                        { x: 480, y: 350, pressed: false, id: 2, label: "3" }
                    ];
                    platforms = [{ x: 0, y: 370, w: 600, h: 30 }];
                    doorUnlocked = false;
                    this.sequence = [];
                }
            },
            {
                // Level 12: Final - combination
                hint: "Naciśnij przycisk, potem skocz 3 razy!",
                init: () => {
                    player = { x: 50, y: 300, vx: 0, vy: 0, grounded: false };
                    door = { x: 520, y: 280, locked: true };
                    buttons = [{ x: 150, y: 350, pressed: false }];
                    platforms = [{ x: 0, y: 370, w: 600, h: 30 }];
                    doorUnlocked = false;
                    this.jumpCount = 0;
                    this.buttonPressed = false;
                }
            }
        ];

        // Input handling
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            // Jump
            if ((e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') && player.grounded) {
                player.vy = JUMP_FORCE;
                player.grounded = false;
                
                // Level 12: count jumps after button pressed
                if (currentLevel === 11 && levels[currentLevel].buttonPressed) {
                    levels[currentLevel].jumpCount++;
                    if (levels[currentLevel].jumpCount >= 3) {
                        doorUnlocked = true;
                    }
                }
            }

            // Level 6: secret W press
            if (currentLevel === 5 && e.code === 'KeyW' && player.grounded) {
                doorUnlocked = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Initialize level
        function initLevel(levelIndex) {
            currentLevel = levelIndex;
            document.getElementById('levelNum').textContent = levelIndex + 1;
            document.getElementById('hintText').textContent = levels[levelIndex].hint;
            
            if (levels[levelIndex].init) {
                levels[levelIndex].init();
            }
        }

        // Physics and movement
        function updatePlayer() {
            let moveX = 0;
            const reversed = levels[currentLevel].reversed;

            // Horizontal movement
            if (keys['KeyA'] || keys['ArrowLeft']) {
                moveX = reversed ? MOVE_SPEED : -MOVE_SPEED;
            }
            if (keys['KeyD'] || keys['ArrowRight']) {
                moveX = reversed ? -MOVE_SPEED : MOVE_SPEED;
            }

            player.vx = moveX;
            player.x += player.vx;

            // Gravity
            if (!player.grounded) {
                player.vy += GRAVITY;
            }
            player.y += player.vy;

            // Collision with platforms
            player.grounded = false;
            platforms.forEach(platform => {
                if (player.x + PLAYER_SIZE > platform.x &&
                    player.x < platform.x + platform.w &&
                    player.y + PLAYER_SIZE > platform.y &&
                    player.y + PLAYER_SIZE < platform.y + 20 &&
                    player.vy >= 0) {
                    player.y = platform.y - PLAYER_SIZE;
                    player.vy = 0;
                    player.grounded = true;
                }
            });

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - PLAYER_SIZE) player.x = canvas.width - PLAYER_SIZE;
            if (player.y > canvas.height) {
                player.y = 300;
                player.vy = 0;
            }
        }

        // Check button collisions
        function checkButtons() {
            buttons.forEach((btn, index) => {
                if (player.x + PLAYER_SIZE > btn.x &&
                    player.x < btn.x + 40 &&
                    player.y + PLAYER_SIZE > btn.y &&
                    player.y < btn.y + 20) {
                    
                    if (!btn.pressed) {
                        btn.pressed = true;

                        // Level 2, 3: simple unlock
                        if (currentLevel === 1 || currentLevel === 2) {
                            doorUnlocked = true;
                        }

                        // Level 4: sequence check
                        if (currentLevel === 3) {
                            levels[currentLevel].sequence.push(btn.id);
                            if (levels[currentLevel].sequence.length === 2) {
                                if (JSON.stringify(levels[currentLevel].sequence) === JSON.stringify([0, 1])) {
                                    doorUnlocked = true;
                                } else {
                                    // Reset
                                    buttons.forEach(b => b.pressed = false);
                                    levels[currentLevel].sequence = [];
                                }
                            }
                        }

                        // Level 7: reversed controls unlock
                        if (currentLevel === 6) {
                            doorUnlocked = true;
                        }

                        // Level 9: door is button
                        if (currentLevel === 8 && door.isButton) {
                            // Check if touching door
                            if (player.x + PLAYER_SIZE > door.x &&
                                player.x < door.x + 50 &&
                                player.y + PLAYER_SIZE > door.y &&
                                player.y < door.y + 60) {
                                doorUnlocked = true;
                            }
                        }

                        // Level 11: three buttons sequence
                        if (currentLevel === 10) {
                            levels[currentLevel].sequence.push(btn.id);
                            if (levels[currentLevel].sequence.length === 3) {
                                if (JSON.stringify(levels[currentLevel].sequence) === JSON.stringify([0, 1, 2])) {
                                    doorUnlocked = true;
                                } else {
                                    buttons.forEach(b => b.pressed = false);
                                    levels[currentLevel].sequence = [];
                                }
                            }
                        }

                        // Level 12: first press button
                        if (currentLevel === 11) {
                            levels[currentLevel].buttonPressed = true;
                        }
                    }
                }
            });
        }

        // Check door collision
        function checkDoor() {
            if (doorUnlocked &&
                player.x + PLAYER_SIZE > door.x &&
                player.x < door.x + 50 &&
                player.y + PLAYER_SIZE > door.y &&
                player.y < door.y + 60) {
                nextLevel();
            }
        }

        // Level-specific updates
        function levelSpecificUpdate() {
            // Level 5: auto unlock after 3 seconds
            if (currentLevel === 4) {
                levelTimer++;
                if (levelTimer > 180) { // 3 seconds at 60fps
                    doorUnlocked = true;
                }
            }

            // Level 10: moving platform
            if (currentLevel === 9) {
                platforms.forEach(platform => {
                    if (platform.moving) {
                        platform.y += platform.dir * 2;
                        if (platform.y <= platform.minY || platform.y >= platform.maxY) {
                            platform.dir *= -1;
                        }
                    }
                });
            }
        }

        // Drawing
        function draw() {
            // Clear
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Platforms
            ctx.fillStyle = '#8b4513';
            platforms.forEach(platform => {
                ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 2;
                ctx.strokeRect(platform.x, platform.y, platform.w, platform.h);
            });

            // Buttons
            buttons.forEach(btn => {
                ctx.fillStyle = btn.pressed ? '#00ff00' : '#ff0000';
                ctx.fillRect(btn.x, btn.y, 40, 20);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(btn.x, btn.y, 40, 20);
                
                if (btn.label) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '12px "Press Start 2P"';
                    ctx.fillText(btn.label, btn.x + 13, btn.y + 15);
                }
            });

            // Door
            ctx.fillStyle = doorUnlocked ? '#00ff00' : '#8b0000';
            ctx.fillRect(door.x, door.y, 50, 60);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.strokeRect(door.x, door.y, 50, 60);
            
            // Door handle
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(door.x + 40, door.y + 30, 5, 0, Math.PI * 2);
            ctx.fill();

            // Player
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);
            
            // Player eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x + 8, player.y + 10, 5, 5);
            ctx.fillRect(player.x + 17, player.y + 10, 5, 5);
        }

        // Game loop
        function gameLoop() {
            updatePlayer();
            checkButtons();
            checkDoor();
            levelSpecificUpdate();
            draw();
            animationFrame = requestAnimationFrame(gameLoop);
        }

        // Next level
        function nextLevel() {
            currentLevel++;
            if (currentLevel >= levels.length) {
                showMessage('GRATULACJE!', 'Ukończyłeś wszystkie poziomy!');
                cancelAnimationFrame(animationFrame);
            } else {
                initLevel(currentLevel);
            }
        }

        // Show message
        function showMessage(title, text) {
            document.getElementById('messageTitle').textContent = title;
            document.getElementById('messageText').textContent = text;
            document.getElementById('messageOverlay').style.display = 'flex';
        }

        // Start game
        initLevel(0);
        gameLoop();
    </script>
</body>
</html>
