<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #gracz {
            position: fixed;
            width: 75px;
            height: 75px;
            z-index: 10;
            margin-left: 50%;
            margin-top: 20%;
        }

        #wygr {
            margin-left: 500px;
            width: 100px;
            height: 100px;
            background-color: green;
        }

        #otw {
            margin-left: 200px;
            width: 100px;
            height: 100px;
            background-color: rgb(206, 206, 0);
        }

        #drzwi {
            margin-left: 500px;
            width: 100px;
            height: 100px;
            background-color: rgb(128, 40, 0);
        }

        #sciana {
            margin-left: 700px;
            width: 100px;
            height: 100px;
            background-color: black;
        }
    </style>
</head>
<body>
    
<div id="gracz">
        <img id="player-img" src="1.png" alt="standing still">
    </div>


<div id="wygr"></div>

<div id="otw"></div>

<div id="drzwi"></div>

<div id="sciana"></div>

    <script>

        const j = document.getElementById("gracz")
        const wcisnieteklawisze = {};
        const wygr = document.getElementById("wygr")
        const otw = document.getElementById("otw")
        const drzwi = document.getElementById("drzwi")
        const sciana = document.getElementById("sciana")
        const moc = 5;
        let poziom = 0;

        function nastepny() {

            poziom += 1;
            console.log("Poziom:", poziom);

        }



        function otworz() {

            drzwi.id = "wygr";

        }

        

        let X = 0;
        let Y = 0;
        

        document.addEventListener("keyup", e => {
            const key = e.key.toLowerCase();
            if (['w','a','s','d'].includes(key)) {
                wcisnieteklawisze[key] = false;
            }
        });

        document.addEventListener("keydown", e => {
            const key = e.key.toLowerCase();
            if (['w','a','s','d'].includes(key)) {
                wcisnieteklawisze[key] = true;
            }
                });

        function ruch(){

            let stareX = X;
            let stareY = Y;

            

            if (wcisnieteklawisze['w']) Y -= moc;
            if (wcisnieteklawisze['s']) Y += moc;
            if (wcisnieteklawisze['a']) X -= moc;
            if (wcisnieteklawisze['d']) X += moc;

            j.style.left = `${X}px`;
            j.style.top = `${Y}px`;

            

            if (kolizja()){
                nastepny();
            }

            if (kolizja2()){
                otworz();
            }

            if (kolizja3()){
                X = stareX;
                Y = stareY;
                j.style.left = `${X}px`;
                j.style.top = `${Y}px`;
            }

            requestAnimationFrame(ruch); 
        }

        function kolizja() {
            const graczRect = j.getBoundingClientRect();
            const wygrRect = wygr.getBoundingClientRect();
            return !(
                graczRect.right < wygrRect.left ||
                graczRect.left > wygrRect.right ||
                graczRect.bottom < wygrRect.top ||
                graczRect.top > wygrRect.bottom

            )
        }

        function kolizja2() {
            const graczRect = j.getBoundingClientRect();
            const otwRect = otw.getBoundingClientRect();
            return !(
                graczRect.right < otwRect.left ||
                graczRect.left > otwRect.right ||
                graczRect.bottom < otwRect.top ||
                graczRect.top > otwRect.bottom

            )
        }

        function kolizja3() {
            const graczRect = j.getBoundingClientRect();
            const scianaRect = sciana.getBoundingClientRect();
            return !(
                graczRect.right < scianaRect.left ||
                graczRect.left > scianaRect.right ||
                graczRect.bottom < scianaRect.top ||
                graczRect.top > scianaRect.bottom

            )
        }

        requestAnimationFrame(ruch);
        nastepny()
    </script>
</body>
</html>
