<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Escapists Style Puzzle - International Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0d0f14;
            --escapists-gray-ui: #2a2a2a;      
            --escapists-ui-border: #4a4a4a;    
            --escapists-blue-bar: #2e66d4;     
            
            --tile-floor: #7a8787;             
            --tile-line: #636f6f;              
            --wall-top: #d2d2d2;               
            --wall-front: #352d3a;             
            --wall-shadow: rgba(0, 0, 0, 0.5); 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-size: 24px;
            letter-spacing: 1px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .escapists-window {
            background-color: var(--escapists-gray-ui);
            border: 4px solid #111111;
            box-shadow: inset 4px 4px 0px var(--escapists-ui-border), 
                        inset -4px -4px 0px #151515,
                        12px 12px 0px rgba(0, 0, 0, 0.7); 
            border-radius: 0px;
            padding: 24px;
            color: #d2d2d2;
        }

        #main-menu {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #12161f;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgba(0,0,0,0.3) 2px, transparent 2px),
                              linear-gradient(90deg, rgba(0,0,0,0.3) 2px, transparent 2px);
            background-size: 8px 8px;
        }

        .menu-title {
            font-size: 4.5rem;
            color: #facc15;
            margin-bottom: 40px;
            text-shadow: 6px 6px 0px #000;
            text-align: center;
            line-height: 0.9;
        }

        .menu-btn {
            font-family: 'VT323', monospace;
            font-size: 2rem;
            color: #ffffff;
            background-color: #333333;
            border: 4px solid #111111;
            box-shadow: inset 4px 4px 0px #555555, 6px 6px 0px rgba(0,0,0,0.6);
            border-radius: 0px;
            padding: 8px 24px;
            margin: 12px;
            cursor: pointer;
            width: 280px;
            text-align: center;
        }

        .menu-btn:hover {
            background-color: #444444;
            color: #facc15;
            box-shadow: inset 4px 4px 0px #666666, 8px 8px 0px rgba(0,0,0,0.8);
        }

        .menu-btn:active {
            transform: translate(4px, 4px);
            box-shadow: inset 2px 2px 0px #444444, 2px 2px 0px rgba(0,0,0,0.6);
        }

        #settings-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            width: 100%;
        }

        /* --- SIATKA JĘZYKÓW Z FLAGAMI --- */
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            max-width: 500px;
        }

        .lang-btn {
            background: #222;
            border: 3px solid #111;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            padding: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-start;
        }
        .lang-btn:hover {
            background: #444;
            color: #facc15;
            border-color: #facc15;
        }
        .lang-btn.active {
            background: #1e3a8a;
            border-color: #3b82f6;
        }

        /* --- GENEROWANE PIKSELOWO FLAGI CSS (CRISP RETRO) --- */
        .flag {
            width: 30px;
            height: 20px;
            border: 2px solid #111;
            flex-shrink: 0;
            display: inline-block;
        }
        
        /* PL */ .f-pl { background: linear-gradient(#fff 50%, #dc2626 50%); }
        /* UK (Uproszczona pikselowa) */ .f-uk { background: radial-gradient(circle, #dc2626 15%, transparent 15%), linear-gradient(90deg, transparent 40%, #fff 40%, #fff 60%, transparent 60%), linear-gradient(transparent 40%, #fff 40%, #fff 60%, transparent 60%), #1e3a8a; }
        /* ES */ .f-es { background: linear-gradient(#b91c1c 25%, #facc15 25%, #facc15 75%, #b91c1c 75%); }
        /* FR */ .f-fr { background: linear-gradient(90deg, #1d4ed8 33.3%, #fff 33.3%, #fff 66.6%, #dc2626 66.6%); }
        /* IT */ .f-it { background: linear-gradient(90deg, #15803d 33.3%, #fff 33.3%, #fff 66.6%, #dc2626 66.6%); }
        /* PT */ .f-pt { background: linear-gradient(90deg, #15803d 40%, #dc2626 40%); }
        /* CZ */ .f-cz { background: tailwind; background-image: linear-gradient(30deg, #1d4ed8 45%, transparent 45%), linear-gradient(#fff 50%, #dc2626 50%); }
        /* DE */ .f-de { background: linear-gradient(#000 33.3%, #dc2626 33.3%, #dc2626 66.6%, #facc15 66.6%); }
        /* RU */ .f-ru { background: linear-gradient(#fff 33.3%, #1d4ed8 33.3%, #1d4ed8 66.6%, #dc2626 66.6%); }
        /* UA */ .f-ua { background: linear-gradient(#2563eb 50%, #eab308 50%); }
        /* BY */ .f-by { background: linear-gradient(90deg, #b91c1c 20%, transparent 20%), linear-gradient(#b91c1c 65%, #16a34a 65%); background-color: #fff; }
        /* FI */ .f-fi { background: linear-gradient(90deg, transparent 30%, #1d4ed8 30%, #1d4ed8 50%, transparent 50%), linear-gradient(transparent 40%, #1d4ed8 40%, #1d4ed8 60%, transparent 60%), #fff; }
        /* HU */ .f-hu { background: linear-gradient(#dc2626 33.3%, #fff 33.3%, #fff 66.6%, #16a34a 66.6%); }
        /* HR */ .f-hr { background: radial-gradient(circle, #dc2626 20%, transparent 20%), linear-gradient(#dc2626 33.3%, #fff 33.3%, #fff 66.6%, #1d4ed8 66.6%); }
        /* TATARSTAN */ .f-tat { background: linear-gradient(#16a34a 45%, #fff 45%, #fff 55%, #dc2626 55%); }

        .status-bar-container {
            width: 140px;
            height: 16px;
            background-color: #151515;
            border: 3px solid #111111;
            border-radius: 0px;
            overflow: hidden;
        }

        .status-bar-fill {
            height: 100%;
            background-color: var(--escapists-blue-bar);
            box-shadow: inset 0 4px 0px rgba(255,255,255,0.3);
            width: 100%;
        }

        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #ui-container {
            width: 800px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .hud-panel {
            background-color: #242b35;
            border: 4px solid #111111;
            border-radius: 0px;
            padding: 4px 16px;
            font-size: 1.6rem;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hud-btn {
            background-color: #333d4b;
            cursor: pointer;
            border-color: #111111;
            box-shadow: inset 3px 3px 0px #4c5a6e, 6px 6px 0px rgba(0,0,0,0.6);
        }
        .hud-btn:hover { background-color: #414e5f; color: #facc15; }
        .hud-btn:active { transform: translate(2px, 2px); box-shadow: none; }
        
        .btn-quit {
            background-color: #5a2e2e;
            box-shadow: inset 3px 3px 0px #7e4343, 6px 6px 0px rgba(0,0,0,0.6);
        }
        .btn-quit:hover { background-color: #713838; color: #ff8888; }

        #game-board {
            position: relative;
            width: 800px;
            height: 480px;
            border: 8px solid #111111;
            border-radius: 0px;
            box-shadow: 0px 16px 0px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            background-color: var(--tile-floor);
            background-image: 
                linear-gradient(45deg, var(--tile-line) 25%, transparent 25%, transparent 75%, var(--tile-line) 75%, var(--tile-line)),
                linear-gradient(45deg, var(--tile-line) 25%, transparent 25%, transparent 75%, var(--tile-line) 75%, var(--tile-line));
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
        }

        .game-object { position: absolute; box-sizing: border-box; }

        .wall {
            background-color: var(--wall-top);
            border-bottom: 20px solid var(--wall-front); 
            border-radius: 0px;
            box-shadow: inset 3px 3px 0px #ffffff, inset -3px 0px 0px #888888, 16px 28px 0px var(--wall-shadow);
            z-index: 5;
        }

        #player {
            width: 40px; height: 44px;
            background-image: url('https://art.pixilart.com/d92036c1eedf8f4.png');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            z-index: 10; filter: drop-shadow(8px 10px 0px rgba(0, 0, 0, 0.5));
        }

        #button-trigger {
            width: 36px; height: 36px; background: #444444; border: 4px solid #111111; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            box-shadow: 4px 6px 0px var(--wall-shadow);
        }
        #button-trigger::after {
            content: ''; width: 16px; height: 16px; background: #ba2525; border: 3px solid #111111;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.4);
        }
        #button-trigger.pressed::after { background: #25ba45; box-shadow: none; transform: scale(0.9); }

        #door {
            width: 40px; height: 72px; background-color: #2a313a; border: 4px solid #111111;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 6px, #111111 6px, #111111 10px);
            box-shadow: 8px 12px 0px var(--wall-shadow); z-index: 4;
            transition: opacity 0.1s, transform 0.15s steps(3);
        }
        #door.open { opacity: 0.1; transform: scaleX(0.2); box-shadow: none; }

        #level-task-text {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; padding: 6px 16px; border: 4px solid #111111;
            font-size: 1.4rem; color: #ffffff; pointer-events: none;
            text-align: center; max-width: 90%; z-index: 20; box-shadow: 6px 6px 0px rgba(0,0,0,0.6);
        }

        #hint-modal, #input-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 400; width: 380px; text-align: center;
        }
        #input-modal input {
            font-family: 'VT323', monospace; width: 100%; padding: 6px; margin: 16px 0;
            background: #111111; border: 4px solid #444444; color: #ffffff; outline: none;
            text-align: center; font-size: 2rem;
        }

        .color-btn { width: 36px; height: 36px; border: 4px solid #111111; cursor: pointer; display: none; z-index: 8; box-shadow: 4px 6px 0px var(--wall-shadow); }
        .level-passed { animation: levelPassedFlash 0.2s steps(2); }
        @keyframes levelPassedFlash { 0% { filter: brightness(1); } 50% { filter: brightness(1.6); } 100% { filter: brightness(1); } }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="escapists-window" style="display:flex; flex-direction:column; align-items:center; width:420px; padding:40px 20px;">
            <div class="menu-title" id="m-title">THE ESCAPISTS<br><span style="font-size:2rem; color:#888888; letter-spacing: 2px;">PUZZLE INTERFACE</span></div>
            <button class="menu-btn" id="m-start" onclick="startGame()">START GAME</button>
            <button class="menu-btn" id="m-settings" onclick="openSettings()">SETTINGS</button>
        </div>
    </div>

    <div id="settings-overlay">
        <div class="escapists-window" style="width: 540px;">
            <h3 style="margin-bottom: 15px; text-align:center; color: #facc15; font-size:2.2rem;" id="ui-config-title">SYSTEM CONFIG</h3>
            
            <div class="setting-row">
                <span id="ui-music-label">8-BIT MUSIC:</span>
                <button id="music-toggle-btn" class="menu-btn" style="width:110px; margin:0; padding:4px;" onclick="toggleMusic()">ON</button>
            </div>

            <hr style="border: 2px solid #111; margin: 15px 0;">
            <span style="font-size: 1.5rem; color: #facc15;" id="ui-lang-label">SELECT LANGUAGE:</span>
            
            <div class="lang-grid">
                <button class="lang-btn" id="lang-en" onclick="setLanguage('en')"><div class="flag f-uk"></div>English</button>
                <button class="lang-btn" id="lang-pl" onclick="setLanguage('pl')"><div class="flag f-pl"></div>Polski</button>
                <button class="lang-btn" id="lang-es" onclick="setLanguage('es')"><div class="flag f-es"></div>Español</button>
                <button class="lang-btn" id="lang-fr" onclick="setLanguage('fr')"><div class="flag f-fr"></div>Français</button>
                <button class="lang-btn" id="lang-it" onclick="setLanguage('it')"><div class="flag f-it"></div>Italiano</button>
                <button class="lang-btn" id="lang-pt" onclick="setLanguage('pt')"><div class="flag f-pt"></div>Português</button>
                <button class="lang-btn" id="lang-cz" onclick="setLanguage('cz')"><div class="flag f-cz"></div>Čeština</button>
                <button class="lang-btn" id="lang-de" onclick="setLanguage('de')"><div class="flag f-de"></div>Deutsch</button>
                <button class="lang-btn" id="lang-ru" onclick="setLanguage('ru')"><div class="flag f-ru"></div>Русский</button>
                <button class="lang-btn" id="lang-tat" onclick="setLanguage('tat')"><div class="flag f-tat"></div>Tatarça</button>
                <button class="lang-btn" id="lang-ua" onclick="setLanguage('ua')"><div class="flag f-ua"></div>Українська</button>
                <button class="lang-btn" id="lang-by" onclick="setLanguage('by')"><div class="flag f-by"></div>Беларуская</button>
                <button class="lang-btn" id="lang-fi" onclick="setLanguage('fi')"><div class="flag f-fi"></div>Suomi</button>
                <button class="lang-btn" id="lang-hu" onclick="setLanguage('hu')"><div class="flag f-hu"></div>Magyar</button>
                <button class="lang-btn" id="lang-hr" onclick="setLanguage('hr')"><div class="flag f-hr"></div>Hrvatski</button>
            </div>

            <button class="menu-btn" style="width:100%; margin: 20px 0 0 0; padding:6px;" id="ui-back" onclick="closeSettings()">BACK</button>
        </div>
    </div>

    <div id="game-container">
        <div id="ui-container">
            <div class="hud-panel btn-quit" id="ui-menu" onclick="backToMenu()">MENU</div>
            <div class="hud-panel" id="lvl-display">CELL: 01/10</div>
            <div class="hud-panel" id="timer-display" style="color: #facc15;">TIME: 00:00</div>
            <div class="hud-panel" style="gap:5px;">
                <span style="font-size:1.1rem; color:#ff4444;" id="ui-energy">ENERGY:</span>
                <div class="status-bar-container"><div class="status-bar-fill"></div></div>
            </div>
            <div class="hud-panel hud-btn" id="btn-hint" onclick="toggleHint()">HINT</div>
        </div>

        <div id="game-board">
            <div id="player" class="game-object"></div>
            <div id="door" class="game-object" style="top: 200px; left: 712px;"></div>
            <div id="button-trigger" class="game-object" style="top: 220px; left: 120px;"></div>

            <div id="c-red" class="game-object color-btn" style="top: 100px; left: 300px; background: #ba2525;"></div>
            <div id="c-green" class="game-object color-btn" style="top: 100px; left: 380px; background: #25ba45;"></div>
            <div id="c-blue" class="game-object color-btn" style="top: 100px; left: 460px; background: var(--escapists-blue-bar);"></div>
            
            <div class="game-object wall" style="top: 0; left: 0; width: 800px; height: 32px;"></div>
            <div class="game-object wall" style="top: 428px; left: 0; width: 800px; height: 32px;"></div>
            <div class="game-object wall" style="top: 32px; left: 0; width: 32px; height: 396px;"></div>
            <div class="game-object wall" style="top: 32px; left: 768px; width: 32px; height: 396px;"></div>

            <div id="level-task-text">...</div>
        </div>
    </div>

    <div id="input-modal" class="escapists-window">
        <p id="input-label" style="font-size:1.6rem;">...</p>
        <input type="text" id="password-input" autocomplete="off" placeholder="...">
        <button class="menu-btn" style="width:160px; margin:0;" id="ui-submit" onclick="checkPassword()">SUBMIT</button>
    </div>

    <div id="hint-modal" class="escapists-window">
        <h3 style="color:#facc15; margin-bottom:8px; font-size:2.2rem;" id="ui-intel-title">GUARD INTEL:</h3>
        <p id="hint-text" style="font-size:1.5rem;">-</p>
        <button class="menu-btn" onclick="toggleHint()" style="margin-top:16px; width:160px;" id="ui-close-hint">CLOSE</button>
    </div>

    <script>
        // --- SŁOWNIK JĘZYKÓW (15 JĘZYKÓW) ---
        const locale = {
            en: {
                title: "THE ESCAPISTS<br><span style='font-size:2rem; color:#888888; letter-spacing: 2px;'>PUZZLE INTERFACE</span>",
                start: "START GAME", settings: "SETTINGS", config: "SYSTEM CONFIG", music: "8-BIT MUSIC:",
                lang: "SELECT LANGUAGE:", back: "BACK", energy: "ENERGY:", hint: "HINT", cell: "CELL:",
                time: "TIME:", submit: "SUBMIT", intel: "GUARD INTEL:", close: "CLOSE",
                alarm: "ALARM! Resetting level.", win: "SUCCESS! Escape completed.", denied: "ACCESS DENIED.",
                input_code: "Enter authentication code:", input_door: "SYSTEM 05. ENTER PASSWORD:", input_omega: "EVACUATION CODE:",

                levels: {

                    10: { task: "Level 10: Omega Protocol. Step 1: Input color sequence.", hint: "Colors -> Shake Mouse -> Click Door and enter password: ESCAPE" }
                }
            },
            pl: {
                title: "THE ESCAPISTS<br><span style='font-size:2rem; color:#888888; letter-spacing: 2px;'>PUZZLE INTERFACE</span>",
                start: "START GRA", settings: "USTAWIENIA", config: "KONFIG. SYSTEMU", music: "MUZYKA 8-BIT:",
                lang: "WYBIERZ JĘZYK:", back: "POWRÓT", energy: "ENERGIA:", hint: "POZNAJ", cell: "CELA:",
                time: "CZAS:", submit: "ZATWIERDŹ", intel: "RAPORT STRAŻY:", close: "ZAMKNIJ",
                alarm: "ALARM! Reset poziomu.", win: "SUKCES! Ucieczka zakończona.", denied: "ODMOWA DOSTĘPU.",
                input_code: "Wprowadź kod autoryzacji:", input_door: "SYSTEM 05. PODAJ HASŁO:", input_omega: "KOD EWAKUACJI:",
                l6_run: "Poziom 6: Synchronizacja systemowa... ({s}s)", l6_done: "Dekompilacja udana! Biegnij!", l10_s2: "Poziom 10: Krok 2: Wywołaj zwarcie (Potrząsaj myszką).", l10_s3: "Poziom 10: Krok 3: Kliknij drzwi i wpisz hasło.",
                levels: {
                    1: { task: "Poziom 1: Użyj myszy i kliknij czerwony przełącznik na podłodze.", hint: "Podejdź i kliknij na czerwony kwadrat." },
                    2: { task: "Poziom 2: Zacięty zamek. Popukaj w drzwi celi (Kliknij je 5 razy).", hint: "Klikaj rytmicznie w strukturę drzwi po prawej." },

                    6: { task: "Poziom 6: System pobiera dane. Zachowaj absolutny bezruch przez 5 sekund.", hint: "Nie ruszaj postacią ani myszką. Odczekaj czas." },

                    10: { task: "Poziom 10: Ostateczna blokada. Krok 1: Wprowadź sekwencję barw.", hint: "Barwy -> Potrząsanie myszką -> Kliknięcie na drzwi i hasło ESCAPE." }
                }
            },

            document.getElementById("btn-hint").innerText = locale[lang].hint;
            document.getElementById("ui-submit").innerText = locale[lang].submit;
            document.getElementById("ui-intel-title").innerText = locale[lang].intel;
            document.getElementById("ui-close-hint").innerText = locale[lang].close;

            updateLevelStrings();
        }

        function updateLevelStrings() {
            const data = locale[currentLang].levels[currentLevel];
            if (lvl6_timer) {
                taskText.innerText = locale[currentLang].l6_run.replace("{s}", lvl6_seconds);
            } else if (currentLevel === 10 && lvl10_stage === 1) {
                taskText.innerText = locale[currentLang].l10_s2;
            } else if (currentLevel === 10 && lvl10_stage === 2) {
                taskText.innerText = locale[currentLang].l10_s3;
            } else {
                taskText.innerText = data.task;
            }
            hintText.innerText = data.hint;
            lvlDisplay.innerText = `${locale[currentLang].cell} ${String(currentLevel).padStart(2, '0')}/10`;
        }

        // --- SILNIK ROZGRYWKI ---
        const playerEl = document.getElementById("player"); const doorEl = document.getElementById("door"); const btnEl = document.getElementById("button-trigger");
        const boardEl = document.getElementById("game-board"); const lvlDisplay = document.getElementById("lvl-display"); const timerDisplay = document.getElementById("timer-display");
        const hintText = document.getElementById("hint-text"); const hintModal = document.getElementById("hint-modal"); const inputModal = document.getElementById("input-modal");
        const passInput = document.getElementById("password-input"); const taskText = document.getElementById("level-task-text"); const inputLabel = document.getElementById("input-label");

        let currentLevel = 1; let doorOpen = false; let gameTime = 0; let timerInterval;
        let playerX = 200; let playerY = 220; const playerWidth = 40; const playerHeight = 44; const playerSpeed = 4; const keysPressed = {};
        let walkFramesCounter = 0; let isFlipped = false;

        let lvl2_door_knocks = 0; let lvl4_sequence = []; let lvl6_timer = null; let lvl6_seconds = 0; let lvl7_shake_score = 0; let lvl9_clicks = 0; let lvl9_active = false; let lvl9_timer = null; let lvl10_stage = 0;

        const levelsInit = {
            1: { init: () => { btnEl.style.display = "flex"; } },
            2: { init: () => { btnEl.style.display = "none"; } },
            3: { init: () => {} },
            4: { init: () => { document.querySelectorAll('.color-btn').forEach(b => b.style.display = "block"); } },
            5: { init: () => { document.querySelectorAll('.color-btn').forEach(b => b.style.display = "none"); } },
            6: { init: () => {
                lvl6_seconds = 5;
                lvl6_timer = setInterval(() => {
                    lvl6_seconds--; taskText.innerText = locale[currentLang].l6_run.replace("{s}", lvl6_seconds);
                    if (lvl6_seconds <= 0) { clearInterval(lvl6_timer); openDoor(); taskText.innerText = locale[currentLang].l6_done; }
                }, 1000);
            }},
            7: { init: () => {} },
            8: { init: () => { btnEl.style.display = "flex"; openDoor(); } },
            9: { init: () => { btnEl.style.display = "flex"; closeDoor(); } },
            10: { init: () => { btnEl.style.display = "none"; document.querySelectorAll('.color-btn').forEach(b => b.style.display = "block"); } }
        };

        const walls = [{ x: 0, y: 0, w: 800, h: 32 }, { x: 0, y: 428, w: 800, h: 32 }, { x: 0, y: 32, w: 32, h: 396 }, { x: 768, y: 32, w: 32, h: 396 }];

        document.addEventListener("keyup", e => { const k = e.key.toLowerCase(); if (['w','a','s','d'].includes(k)) keysPressed[k] = false; });
        document.addEventListener("keydown", e => { const k = e.key.toLowerCase(); if (['w','a','s','d'].includes(k)) keysPressed[k] = true; });

        boardEl.addEventListener("mousemove", () => {
            if (currentLevel === 7 && !doorOpen) { lvl7_shake_score++; if (lvl7_shake_score > 100) openDoor(); }
            if (currentLevel === 10 && lvl10_stage === 1) {
                lvl7_shake_score++; if (lvl7_shake_score > 100) { lvl10_stage = 2; taskText.innerText = locale[currentLang].l10_s3; }
            }
        });

        btnEl.addEventListener("click", () => {
            if (currentLevel === 1) { btnEl.classList.add("pressed"); openDoor(); }
            if (currentLevel === 8) { btnEl.classList.add("pressed"); closeDoor(); resetLevelState(); alert(locale[currentLang].alarm); }
            if (currentLevel === 9) {
                if (!lvl9_active) {
                    lvl9_active = true; lvl9_clicks = 1;
                    lvl9_timer = setTimeout(() => {
                        if (lvl9_clicks >= 10) { openDoor(); } else { alert(locale[currentLang].denied); lvl9_active = false; lvl9_clicks = 0; }
                    }, 3000);
                } else {
                    lvl9_clicks++; if (lvl9_clicks >= 10 && lvl9_timer) { openDoor(); clearTimeout(lvl9_timer); }
                }
            }
        });

        doorEl.addEventListener("click", () => {
            if (currentLevel === 2) { lvl2_door_knocks++; if (lvl2_door_knocks >= 5) openDoor(); }
            if (currentLevel === 5) { inputLabel.innerText = locale[currentLang].input_door; inputModal.style.display = "block"; }
            if (currentLevel === 10 && lvl10_stage === 2) { inputLabel.innerText = locale[currentLang].input_omega; inputModal.style.display = "block"; }
        });

        function handleColorClick(color) {
            if (currentLevel === 4) {
                lvl4_sequence.push(color); const correct = ["red", "green", "blue"];
                if (lvl4_sequence[lvl4_sequence.length - 1] !== correct[lvl4_sequence.length - 1]) { lvl4_sequence = []; } 
                else if (lvl4_sequence.length === 3) { openDoor(); }
            }
            if (currentLevel === 10 && lvl10_stage === 0) {
                lvl4_sequence.push(color); const correct = ["red", "green", "blue"];
                if (lvl4_sequence[lvl4_sequence.length - 1] !== correct[lvl4_sequence.length - 1]) { lvl4_sequence = []; } 
                else if (lvl4_sequence.length === 3) {
                    lvl10_stage = 1; document.querySelectorAll('.color-btn').forEach(b => b.style.display = "none");
                    taskText.innerText = locale[currentLang].l10_s2; lvl7_shake_score = 0;
                }
            }
        }

        document.getElementById("c-red").addEventListener("click", () => handleColorClick("red"));
        document.getElementById("c-green").addEventListener("click", () => handleColorClick("green"));
        document.getElementById("c-blue").addEventListener("click", () => handleColorClick("blue"));

        document.querySelectorAll('.wall').forEach((wallObj, index) => {
            wallObj.addEventListener('click', (e) => {
                if (currentLevel === 3) {
                    const rect = wallObj.getBoundingClientRect(); const clickX = e.clientX - rect.left;
                    if (index === 0 && clickX > 300 && clickX < 500) { wallObj.style.backgroundColor = "#25ba45"; openDoor(); }
                }
            });
        });

        function checkPassword() {
            const val = passInput.value.trim().toUpperCase();
            if (currentLevel === 5 && val === "VIEW") { inputModal.style.display = "none"; openDoor(); } 
            else if (currentLevel === 10 && val === "ESCAPE" && lvl10_stage === 2) { inputModal.style.display = "none"; openDoor(); nextLevel(); } 
            else { alert(locale[currentLang].denied); }
        }

        function openDoor() { doorOpen = true; doorEl.classList.add("open"); }
        function closeDoor() { doorOpen = false; doorEl.classList.remove("open"); }

        function startGame() { initAudio(); switchTrack("game"); document.getElementById("main-menu").style.display = "none"; document.getElementById("game-container").style.display = "flex"; startMainTimer(); }
        function backToMenu() { clearInterval(timerInterval); switchTrack("menu"); currentLevel = 1; resetLevelState(); document.getElementById("main-menu").style.display = "flex"; document.getElementById("game-container").style.display = "none"; }
        function openSettings() { document.getElementById("settings-overlay").style.display = "flex"; }
        function closeSettings() { document.getElementById("settings-overlay").style.display = "none"; }

        function updateGame() {
            let oldX = playerX; let oldY = playerY; let isMoving = false;
            if (keysPressed['w']) { playerY -= playerSpeed; isMoving = true; }
            if (keysPressed['s']) { playerY += playerSpeed; isMoving = true; }
            if (keysPressed['a']) { playerX -= playerSpeed; isMoving = true; }
            if (keysPressed['d']) { playerX += playerSpeed; isMoving = true; }

            if (isMoving) {
                walkFramesCounter++; if (walkFramesCounter >= 10) { isFlipped = !isFlipped; walkFramesCounter = 0; }
                playerEl.style.transform = isFlipped ? "scaleX(-1)" : "scaleX(1)";
            }

            const playerRect = { x: playerX, y: playerY, w: playerWidth, h: playerHeight };
            for (let wall of walls) { if (checkCollision(playerRect, wall)) { playerX = oldX; playerY = oldY; break; } }

            const doorRect = { x: 712, y: 200, w: 40, h: 72 };
            if (checkCollision({ x: playerX, y: playerY, w: playerWidth, h: playerHeight }, doorRect)) {
                if (doorOpen && currentLevel !== 10) { nextLevel(); } else { playerX = oldX; playerY = oldY; }
            }

            playerEl.style.left = `${playerX}px`; playerEl.style.top = `${playerY}px`;
            requestAnimationFrame(updateGame);
        }

        function checkCollision(r1, r2) { return (r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y); }

        function nextLevel() {
            playLevelWinSound(); boardEl.classList.add("level-passed");
            setTimeout(() => boardEl.classList.remove("level-passed"), 200);
            if (currentLevel < 10) { currentLevel++; resetLevelState(); } 
            else {
                alert(`${locale[currentLang].win}\n${locale[currentLang].time} ${timerDisplay.innerText.split(' ')[1]}`);
                backToMenu();
            }
        }

        function resetLevelState() {
            playerX = 200; playerY = 220; closeDoor(); btnEl.classList.remove("pressed");
            inputModal.style.display = "none"; passInput.value = "";
            if (lvl6_timer) { clearInterval(lvl6_timer); lvl6_timer = null; }
            if (lvl9_timer) { clearTimeout(lvl9_timer); lvl9_timer = null; }
            lvl2_door_knocks = 0; lvl4_sequence = []; lvl7_shake_score = 0; lvl9_clicks = 0; lvl9_active = false; lvl10_stage = 0;

            document.querySelectorAll('.wall').forEach(w => w.style.backgroundColor = "var(--wall-top)");
            document.querySelectorAll('.color-btn').forEach(b => b.style.display = "none");
            
            updateLevelStrings();
            levelsInit[currentLevel].init();
        }

        function toggleHint() { hintModal.style.display = hintModal.style.display === "block" ? "none" : "block"; }
        function startMainTimer() {
            gameTime = 0; if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                gameTime++; const m = String(Math.floor(gameTime / 60)).padStart(2, '0'); const s = String(gameTime % 60).padStart(2, '0');
                timerDisplay.innerText = `${locale[currentLang].time} ${m}:${s}`;
            }, 1000);
        }

        // Uruchomienie domyślnego mapowania języka oraz pętli gry
        setLanguage('pl');
        resetLevelState();
        requestAnimationFrame(updateGame);

        window.addEventListener("DOMContentLoaded", () => { document.body.addEventListener("click", () => { initAudio(); }, { once: true }); });
    </script>
</body>
</html>
