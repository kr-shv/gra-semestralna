<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #gracz {
            position: absolute;
            width: 75px;
            height: 75px;
            z-index: 10;
        }
    </style>
</head>
<body>
    
<div id="gracz">
        <img id="player-img" src="1.png" alt="standing still">
    </div>



    <script>

        const wygr = stworz("wygr", 500, 0, "green");
        const otw = stworz("otw", 200, 0, "rgb(206, 206, 0)");
        const drzwi = stworz("drzwi", 500, 100, "rgb(128, 40, 0)");
        const sciana = stworz("sciana", 700, 0, "black");

        const poziomy = [
        {
            wygr: { x: 1720, y: 400 },
            otw: { x: 200, y: -100 },
            drzwi: { x: 500, y: -100 },
            sciany: [
                { x: 0, y: 0, w: 1930, h: 100 },
                { x: 0, y: 0, w: 100, h: 850 },
                { x: 1820, y: 0, w: 100, h: 850 },
                { x: 0, y: 820, w: 1930, h: 100 }
            ]
        },
        {
            wygr: { x: 100, y: -100 },
            otw: { x: 200, y: 100 },
            drzwi: { x: 100, y: 400 },
            sciany: [
                { x: 0, y: 0, w: 1930, h: 100 },
                { x: 0, y: 0, w: 100, h: 850 },
                { x: 1820, y: 0, w: 100, h: 850 },
                { x: 0, y: 820, w: 1930, h: 100 }
            ]
        },
        {
            wygr: { x: 1720, y: -100 },
            otw: { x: 1720, y: 200 },
            drzwi: { x: 1720, y: 600 },
            sciany: [
                { x: 0, y: 0, w: 1930, h: 100 },
                { x: 0, y: 0, w: 100, h: 850 },
                { x: 1820, y: 0, w: 100, h: 850 },
                { x: 0, y: 820, w: 1930, h: 100 },
                { x: 920, y: 400, w: 1000, h: 100 }
            ]
        }
        ]

        const j = document.getElementById("gracz")
        const wcisnieteklawisze = {};
        const moc = 5;
        let poziom = 0;
        let otwarte = false;
        
        function stworz(id, x, y, kolor, w = 100, h = 100) {
            const div = document.createElement("div");
            div.id = id;
            div.style.position = "absolute";
            div.style.left = x + "px";
            div.style.top = y + "px";
            div.style.width = "100px";
            div.style.height = "100px";
            div.style.backgroundColor = kolor;
            div.style.width = w + "px";
            div.style.height = h + "px";
            document.body.appendChild(div);
            return div;
        }

        let sciany = [sciana];

        function nastepny() {

            poziom += 1;
            console.log("Poziom:", poziom);
            otwarte = false;
            drzwi.id = "drzwi";
            drzwi.style.backgroundColor = "rgb(128, 40, 0)";
            const dane = poziomy[poziom - 1];
            if (!dane) return;
            wygr.style.left = dane.wygr.x + "px";
            wygr.style.top = dane.wygr.y + "px";
            otw.style.left = dane.otw.x + "px";
            otw.style.top = dane.otw.y + "px";
            drzwi.style.left = dane.drzwi.x + "px";
            drzwi.style.top = dane.drzwi.y + "px";
            sciany.forEach(s => s.remove());
            sciany = [];

            dane.sciany.forEach((s, i) => {
            sciany.push(stworz("sciana" + i, s.x, s.y, "black", s.w || 100, s.h || 100));
            });

        }



        function otworz() {

            drzwi.style.backgroundColor = "green";
            drzwi.id = "wygr";
            otwarte = true;

        }

        

        let X = 400;
        let Y = 400;
        

        document.addEventListener("keyup", e => {
            const key = e.key.toLowerCase();
            if (['w','a','s','d'].includes(key)) {
                wcisnieteklawisze[key] = false;
            }
        });

        document.addEventListener("keydown", e => {
            const key = e.key.toLowerCase();
            if (['w','a','s','d'].includes(key)) {
                wcisnieteklawisze[key] = true;
            }
                });

        function ruch(){

            let stareX = X;
            let stareY = Y;

            

            if (wcisnieteklawisze['w']) Y -= moc;
            if (wcisnieteklawisze['s']) Y += moc;
            if (wcisnieteklawisze['a']) X -= moc;
            if (wcisnieteklawisze['d']) X += moc;

            j.style.left = `${X}px`;
            j.style.top = `${Y}px`;

            

            if (kolizja()){
                nastepny();
            }

            if (kolizja2()){
                otworz();
            }

            if (kolizja3()){
                X = stareX;
                Y = stareY;
                j.style.left = `${X}px`;
                j.style.top = `${Y}px`;
            }

            if (otwarte && kolizja4()){
                nastepny();
            }

            if (!otwarte && kolizja4()) {
                X = stareX;
                Y = stareY;
                j.style.left = `${X}px`;
                j.style.top = `${Y}px`;
            }

            requestAnimationFrame(ruch); 

        }

function kolizja() {
            const graczRect = j.getBoundingClientRect();
            const wygrRect = wygr.getBoundingClientRect();
            return !(
                graczRect.right <= wygrRect.left ||
                graczRect.left >= wygrRect.right ||
                graczRect.bottom <= wygrRect.top ||
                graczRect.top >= wygrRect.bottom

            )
        }

        function kolizja2() {
            const graczRect = j.getBoundingClientRect();
            const otwRect = otw.getBoundingClientRect();
            return !(
                graczRect.right <= otwRect.left ||
                graczRect.left >= otwRect.right ||
                graczRect.bottom <= otwRect.top ||
                graczRect.top >= otwRect.bottom

            )
        }

        function kolizja3() {
            return sciany.some(s => {
                const graczRect = j.getBoundingClientRect();
                const scianaRect = s.getBoundingClientRect();
                return !(
                    graczRect.right < scianaRect.left ||
                    graczRect.left > scianaRect.right ||
                    graczRect.bottom < scianaRect.top ||
                    graczRect.top > scianaRect.bottom
                );
            });
        }

        function kolizja4() {
            const graczRect = j.getBoundingClientRect();
            const drzwiRect = drzwi.getBoundingClientRect();
            return !(
                graczRect.right <= drzwiRect.left ||
                graczRect.left >= drzwiRect.right ||
                graczRect.bottom <= drzwiRect.top ||
                graczRect.top >= drzwiRect.bottom

            )
        }

        requestAnimationFrame(ruch);
        nastepny()
    </script>
</body>
</html>
